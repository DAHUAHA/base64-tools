version: 1
plan:
  name: 'SEO 全自动引流 - FAQ + meta 优化'
  max_concurrency: 10
  max_consecutive_failures: 2
  max_cycles: 10

tasks:
  - id: keyword-research
    title: '研究各工具页面的搜索热词和竞品分析'
    prompt: |
      对 base64.tools 站点的 6 个工具页面进行 SEO 研究：
      - 工具列表：Base64、JSON、Hash、Time(Hex时间戳)、Hex、URL
      - 域名：zisaac.com，品牌名：base64.tools
      
      任务：
      1. 用 web_search 搜索每个工具的热门长尾关键词（中文 + 英文），各工具找 5-8 个
      2. 找到 2-3 个主要竞品页面，记录它们的 meta 描述和标题写法
      3. 整理输出到 /Users/ismeng/Documents/New project 2/base64tool/.mavis/plans/keyword-research.md
      
      输出格式：
      ## Base64 热词
      - 关键词 + 月搜索量估算 + 竞争度
      ## JSON 热词
      ...
      ## 竞品分析
      - 竞品名 + 标题 + 描述 + 值得借鉴的点
      
      工作目录：/Users/ismeng/Documents/New project 2/base64tool
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证 keyword-research.md 内容：
      1. 每个工具是否有至少 5 个关键词
      2. 竞品分析是否有具体 URL 引用
      3. 关键词是否符合长尾特征（不是泛词）
      4. 验证方式：重新搜索关键词确认覆盖度
      
      工作目录：/Users/ismeng/Documents/New project 2/base64tool
    timeout_ms: 1800000

  - id: faq-content
    title: '为每个工具页面生成 FAQ 和使用教程内容'
    prompt: |
      读取 keyword-research.md 获取热词，然后为 base64.tools 的 6 个工具页面各生成一段 FAQ 内容块：
      - 工具：Base64、JSON、Hash、Time、Hex、URL
      
      每个工具输出：
      1. 3-5 个常见问答（Question + Answer，50-150字）
      2. 1 个简短使用场景说明（50字）
      3. 相关长尾关键词自然融入回答中
      
      输出文件：/Users/ismeng/Documents/New project 2/base64tool/.mavis/plans/faq-content.md
      
      注意：
      - FAQ 内容要自然，符合真实用户搜索意图
      - 避免 AI 生成的机械感，用口语化表达
      - 内容直接可用于插入各工具页面的 info-section
      
      工作目录：/Users/ismeng/Documents/New project 2/base64tool
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证 faq-content.md：
      1. 是否覆盖了全部 6 个工具
      2. 每个工具是否至少有 3 个 QA 对
      3. 内容是否自然（非机器翻译感）
      4. 是否自然融入长尾关键词
      
      工作目录：/Users/ismeng/Documents/New project 2/base64tool
    timeout_ms: 1800000

  - id: meta-optimization
    title: '为 6 个工具页面生成优化的 meta 和 OG 标签'
    prompt: |
      为 base64.tools 的 6 个工具页面（index.html、json.html、hash.html、timestamp.html、hex.html、url.html）生成完整的 meta 优化方案：
      
      每个页面输出：
      1. og:title（不超过 60 字符）
      2. og:description（80-120 字符，中文）
      3. og:image（生成一个工具截图提示 URL 或留空建议尺寸）
      4. twitter:card（summary 或 summary_large_image）
      5. twitter:title
      6. twitter:description
      7. canonical URL（https://www.zisaac.com/工具名）
      
      要求：
      - 标题包含工具名 + 核心价值（免费/在线/快速）
      - 描述包含工具名 + 主要功能 + 1 个差异化卖点
      - 输出到 /Users/ismeng/Documents/New project 2/base64tool/.mavis/plans/meta-optimization.md
      
      工作目录：/Users/ismeng/Documents/New project 2/base64tool
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证 meta-optimization.md：
      1. 是否覆盖了全部 6 个工具页面
      2. og:description 是否在 80-120 字符范围
      3. og:title 是否在 60 字符以内
      4. canonical URL 是否正确指向 zisaac.com
      5. 是否包含完整的 og + twitter 标签
      
      工作目录：/Users/ismeng/Documents/New project 2/base64tool
    timeout_ms: 1800000
